name: Flutter Test Build

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: Build unsigned iOS IPA
        required: true
        type: boolean
        default: false
      build_android:
        description: Build apk
        required: true
        type: boolean
        default: false
      build_windows:
        description: Build Windows installer
        required: true
        type: boolean
        default: false
      build_macos_dmg:
        description: Build unsigned macOS DMG
        required: true
        type: boolean
        default: false
      build_linux_appimage:
        description: Build Linux AppImage
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ==================== Android Job (Linux) ====================
  build-android:
    name: Build Android (Split APK)
    runs-on: ubuntu-latest
    if: ${{ inputs.build_android }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (Stable x64)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          architecture: "x64"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup keystore
        run: |
          test -n '${{ secrets.KEYSTORE }}'
          test -n '${{ secrets.KEY_PROPERTIES }}'
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > android/app/apr-release-key.jks
          echo '${{ secrets.KEY_PROPERTIES }}' > android/key.properties
          test -s android/app/apr-release-key.jks
          grep -q '^storeFile=' android/key.properties

      - name: Build Android Split APKs
        run: flutter build apk --release --split-per-abi --flavor production --obfuscate --split-debug-info=./build/app/intermediates

      - name: Rename Android APKs
        run: |
          VERSION=${GITHUB_REF_NAME:-Test-Build}
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-production-release.apk "build/artifacts/bili-music-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk "build/artifacts/bili-music-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-production-release.apk "build/artifacts/bili-music-${VERSION}-x86_64.apk"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-android
          path: build/artifacts/*.apk
          retention-days: 30

  # ==================== iOS Job (macOS) ====================
  build-ios:
    name: Build iOS (Unsigned IPA)
    runs-on: macos-latest
    if: ${{ inputs.build_ios }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign
          rm -rf Payload
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
          zip -r9 bili-music.ipa Payload

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-ios
          path: bili-music.ipa
          retention-days: 30

      - name: Show IPA Info
        run: ls -lh bili-music.ipa

  # ==================== macOS Job ====================
  build-macos-dmg:
    name: Build macOS DMG (Unsigned)
    runs-on: macos-latest
    if: ${{ inputs.build_macos_dmg }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install packaging tools
        run: |
          npm install -g appdmg
          dart pub global activate fastforge
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Prepare DMG config
        run: |
          mkdir -p macos/packaging/dmg
          cp scripts/macos/make_config.yaml macos/packaging/dmg/make_config.yaml

      - name: Build macOS DMG
        run: fastforge package --platform macos --targets dmg

      - name: Collect macOS DMG
        run: |
          mkdir -p build/artifacts
          DMG_PATH="$(find dist -name '*.dmg' -type f -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found under dist"
            exit 1
          fi
          cp "$DMG_PATH" "build/artifacts/bili-music-Test-Build-macos.dmg"

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-macos-dmg
          path: build/artifacts/*.dmg
          retention-days: 30

  # ==================== Windows Job ====================
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    if: ${{ inputs.build_windows }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Setup Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "Test-Build"
          iscc scripts/bilimusic.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilimusic-windows-installer
          path: build/artifacts/bilimusic-*-windows-setup.exe
          retention-days: 30

  # ==================== Linux Job ====================
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    if: ${{ inputs.build_linux_appimage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.0"
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            file \
            imagemagick \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build AppImage
        run: |
          chmod +x scripts/package_appimage.sh
          scripts/package_appimage.sh "Test-Build"

      - name: Upload Linux AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-linux-appimage
          path: build/artifacts/*.AppImage
          retention-days: 30
